services:
  mysql:
    image: mysql:8.0
    container_name: xiuxian-roguelike-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: xiuxian_game
      MYSQL_USER: xiuxian
      MYSQL_PASSWORD: xiuxian_dev
      MYSQL_ROOT_PASSWORD: root_dev
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - xiuxian_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  xiuxian_mysql_data:

